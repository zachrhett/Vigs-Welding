<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIG'S Mobile Welding & Repair</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #050505;
      color: white;
    }

    .hero {
      width: 100%;
      min-height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero img {
      width: 100%;
      height: auto;
      display: block;
    }

    .content {
      max-width: 1100px;
      padding: 40px 20px;
      text-align: center;
    }

    h1 {
      color: #1f6fff;
      font-size: 2.4rem;
      margin-bottom: 15px;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .call-button {
      display: inline-block;
      margin-top: 20px;
      padding: 16px 28px;
      background: #1f6fff;
      color: white;
      text-decoration: none;
      font-size: 1.3rem;
      font-weight: bold;
      border-radius: 8px;
    }

    .services {
      margin-top: 25px;
      font-size: 1.1rem;
      color: #ddd;
    }
  </style>
</head>

<body>
  <main class="hero">
    <img src="vig-header.png" alt="VIG'S Mobile Welding and Repair header">

    <section class="content">
      <h1>VIG'S Mobile Welding & Repair</h1>

      <p>
        If it needs to be welded, we can do it. We repair fences, trucks,
        and trailers. We also provide new builds and custom fabrication.
      </p>

      <p class="services">
        Mobile Welding • Repairs • Fabrication • New Builds
      </p>

      <a class="call-button" href="tel:9704051227">
        Call Mike: (970) 405-1227
      </a>
    </section>
  </main>
</body>
</html>
